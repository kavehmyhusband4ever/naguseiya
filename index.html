<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nagumo Yoichi x Seiya Amiyama </title>

<!-- Cute modern font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffe6f2, #e6f7ff, #fff5cc);
    text-align: center;
}

header {
    padding: 25px;
    font-size: 1.8em;
    font-weight: 700;
    color: #ff4da6;
}

.upload-box {
    border: 2px dashed #ff99cc;
    border-radius: 20px;
    padding: 30px;
    margin: 20px auto;
    width: 85%;
    max-width: 400px;
    background: white;
    cursor: pointer;
    transition: 0.3s;
}

.upload-box:hover {
    background: #fff0f7;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 20px;
    padding: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    position: relative;
}

.card img {
    width: 100%;
    border-radius: 15px;
    cursor: pointer;
}

.description {
    font-size: 0.85em;
    margin-top: 8px;
    color: #666;
    min-height: 20px;
}

.delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: #ff4da6;
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    color: white;
    cursor: pointer;
    font-size: 14px;
}
</style>
</head>

<body>

<header>Southern Cloud's Star Arrow 🎀🗡</header>

<div class="upload-box" id="uploadBox">
    Tap to upload photos ♡
    <input type="file" id="fileInput" accept="image/*" multiple hidden>
</div>

<div class="gallery" id="gallery"></div>

<script>
const uploadBox = document.getElementById("uploadBox");
const fileInput = document.getElementById("fileInput");
const gallery = document.getElementById("gallery");

let images = JSON.parse(localStorage.getItem("pastelGallery")) || [];

uploadBox.addEventListener("click", () => fileInput.click());

fileInput.addEventListener("change", () => {
    handleFiles(fileInput.files);
    fileInput.value = "";
});

function handleFiles(files) {
    for (let file of files) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const newImage = {
                src: e.target.result,
                description: ""
            };
            images.push(newImage);
            saveAndRender();
        }
        reader.readAsDataURL(file);
    }
}

function saveAndRender() {
    localStorage.setItem("pastelGallery", JSON.stringify(images));
    renderGallery();
}

function renderGallery() {
    gallery.innerHTML = "";
    images.forEach((image, index) => {
        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = image.src;
        img.onclick = function() {
            const text = prompt("Enter description ✿", image.description);
            if (text !== null) {
                images[index].description = text;
                saveAndRender();
            }
        };

        const desc = document.createElement("div");
        desc.className = "description";
        desc.innerText = image.description;

        const del = document.createElement("button");
        del.className = "delete-btn";
        del.innerHTML = "×";
        del.onclick = function() {
            images.splice(index, 1);
            saveAndRender();
        };

        card.appendChild(img);
        card.appendChild(desc);
        card.appendChild(del);
        gallery.appendChild(card);
    });
}

renderGallery();
</script>

</body>
</html>
